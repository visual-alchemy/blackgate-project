services:
  blackgate:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host # Use host networking for direct access to all network interfaces
    # Note: With network_mode: host, ports are exposed directly on the host
    # No port mapping needed - container uses host ports directly
    environment:
      - NODE_IP=127.0.0.1
      - RELEASE_COOKIE="Vt8gXnEI2zRH4l3eqUEBrcGQ22mHSj73CgkYm02u"
      - PHX_SERVER=true
      - PORT=4000
      - PHX_HOST=0.0.0.0
      - API_AUTH_USERNAME=admin
      - API_AUTH_PASSWORD=password123
      - DATABASE_DATA_DIR=/app/khepri
      - LICENSE_SERVER_URL=https://license-server-eta-bay.vercel.app
      - RLIMIT_NOFILE=65536
    volumes:
      - ./data/khepri:/app/khepri
      - ./data/backup:/app/backup

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: blackgate_mediamtx
    restart: unless-stopped
    # host networking so mediamtx can reach blackgate at localhost:4000 for auth webhook
    # and GStreamer can pull rtmpsrc from localhost:1935
    network_mode: host
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
