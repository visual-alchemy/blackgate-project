# Blackgate Kernel Tuning for SRT Streaming
# Optimized for high-bitrate, low-latency video transport

# Network buffer sizes (25 MB for high bitrate SRT)
net.core.rmem_max = 26214400
net.core.wmem_max = 26214400
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576

# Increase network queue length
net.core.netdev_max_backlog = 5000

# File descriptor limit
fs.file-max = 262144

# Connection tracking (for many SRT connections)
net.netfilter.nf_conntrack_max = 65536
