name: Build Blackgate ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-iso:
    name: Build Blackgate ISO
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
          echo "Version: $(cat $GITHUB_OUTPUT | grep version | cut -d= -f2)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Ubuntu Docker ISO
        run: |
          chmod +x iso-builder/build.sh
          # Run inside an Ubuntu Jammy container to prevent host environment pollution
          # and ensure live-build mirrors align with the container OS.
          # Mount Docker socket so the script can still run 'docker build' for Blackgate.
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/workspace \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w /workspace \
            -e VERSION=${{ steps.version.outputs.version }} \
            ubuntu:jammy bash -c "apt-get update && apt-get install -y sudo docker.io syslinux-utils isolinux syslinux syslinux-common grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed shim-signed mtools dosfstools xorriso ca-certificates ubuntu-keyring && ./iso-builder/build.sh"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackgate-${{ steps.version.outputs.version }}-amd64
          path: iso-builder/output/*.iso
          retention-days: 30

  release-iso:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-iso]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.iso
          generate_release_notes: true
          body: |
            ## Blackgate Server ISO Appliance v${{ github.ref_name }}
            
            This release provides a fully self-contained, bootable **Ubuntu 22.04 (Jammy) Server** ISO appliance.
            
            Blackgate is pre-packaged as a Docker container within the ISO, guaranteeing 100% environmental consistency and making future updates effortless. It auto-starts on boot using host networking for optimal UDP streaming performance.
            
            ---
            
            ### Installation
            1. Download `blackgate-*-amd64.iso`
            2. Flash to USB (`dd if=blackgate-*.iso of=/dev/sdX bs=4M`) or mount in VM
            3. Boot and follow the automated Ubuntu installer
            4. Access dashboard at `http://<server-ip>:4000`

            ### Default Credentials
            - **Dashboard**: `admin` / `password123`
            - **SSH**: `blackgate` / `blackgate123`
            
            > ⚠️ Change default passwords after first login!
