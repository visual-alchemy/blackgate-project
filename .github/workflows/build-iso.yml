name: Build Blackgate ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-iso-baremetal:
    name: Build Blackgate ISO (Native / Baremetal)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
          echo "Version: $(cat $GITHUB_OUTPUT | grep version | cut -d= -f2)"

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: web_app/yarn.lock

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Restore _build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Restore Node modules cache
        uses: actions/cache@v4
        with:
          path: web_app/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('web_app/yarn.lock', 'web_app/package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Build Baremetal ISO
        run: |
          chmod +x iso-builder/build.sh
          # Run the build script inside a Debian Bookworm container to avoid live-build compatibility issues
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e VERSION=${{ steps.version.outputs.version }} \
            -e SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE || 'default_secret_key_base_for_build_only_change_in_production_1234567890abcdef' }} \
            debian:bookworm bash -c "apt-get update && apt-get install -y sudo curl make gcc pkg-config libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libsrt-openssl-dev libcjson-dev libcmocka-dev erlang elixir && curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs && npm install -g yarn && ./iso-builder/build.sh"

      - name: Upload Baremetal ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackgate-${{ steps.version.outputs.version }}-amd64
          path: iso-builder/output/*.iso
          retention-days: 30

  build-iso-docker:
    name: Build Blackgate ISO (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
          echo "Version: $(cat $GITHUB_OUTPUT | grep version | cut -d= -f2)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker ISO
        run: |
          chmod +x iso-builder-docker/build.sh
          VERSION=${{ steps.version.outputs.version }} ./iso-builder-docker/build.sh

      - name: Upload Docker ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackgate-${{ steps.version.outputs.version }}-docker-amd64
          path: iso-builder-docker/output/*.iso
          retention-days: 30

  release-isos:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-iso-baremetal, build-iso-docker]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.iso
          generate_release_notes: true
          body: |
            ## Blackgate Server ISO Appliance v${{ github.ref_name }}
            
            This release includes two flavors of the Blackgate Server ISO:
            
            ### 1. Baremetal Edition (`blackgate-*-amd64.iso`)
            The Blackgate backend, native C pipeline, and frontend are natively compiled into the Debian operating system for maximum streaming performance with zero background overhead.
            
            ### 2. Docker Edition (`blackgate-*-docker-amd64.iso`)
            The ISO ships with Docker Engine and the Blackgate Docker image pre-packaged. It auto-starts the container on boot via `docker compose`. Offers guaranteed environmental consistency and easier manual updates.
            
            ---
            
            ### Installation
            1. Download the ISO file of your choice below
            2. Flash to USB (`dd if=blackgate-*.iso of=/dev/sdX bs=4M`) or mount in VM
            3. Boot and follow the automated Debian installer
            4. Access dashboard at `http://<server-ip>:4000`

            ### Default Credentials
            - **Dashboard**: `admin` / `password123`
            - **SSH**: `blackgate` / `blackgate123`
            
            > ⚠️ Change default passwords after first login!
